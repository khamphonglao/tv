<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy TV Online Pro - Web App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Video.js Theme & Core -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/city/index.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <style>
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        /* Custom scrollbar for channel list */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col transition-colors duration-300" id="app-body">

    <!-- Header Navigation -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 p-2 rounded-lg text-white font-black text-xl tracking-wider shadow-md">LIVE</div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Easy TV Online <span class="text-xs font-normal text-gray-400 bg-gray-900 px-2 py-0.5 rounded ml-1">Web App v2.0</span></h1>
                    <p class="text-xs text-gray-400">ระบบสถานีโทรทัศน์ออนไลน์ความละเอียดสูง</p>
                </div>
            </div>
            
            <!-- Search & Actions -->
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <div class="relative flex-1 sm:flex-initial">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="ค้นหาชื่อช่อง..." 
                        class="w-full sm:w-60 bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-red-500 transition-all text-white"
                    >
                </div>
                <button id="theme-toggle" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-lg text-sm transition-colors" title="เปลี่ยนโหมดสี">
                    🌙
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="container mx-auto flex-1 p-4 flex flex-col lg:flex-row gap-6">

        <!-- Left Column: Video Player Panel -->
        <div class="flex-1 flex flex-col">
            <div class="bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-800 relative group">
                <!-- Status Overlay for loading/error messages -->
                <div id="player-status" class="absolute inset-0 bg-black/80 z-10 flex flex-col items-center justify-center hidden transition-all">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-500 mb-2" id="status-spinner"></div>
                    <p id="status-text" class="text-sm font-medium text-gray-300">กำลังโหลดสัญญาณ...</p>
                    <button id="retry-btn" class="mt-4 bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded-md hidden shadow-lg transition-transform active:scale-95">
                        ลองโหลดใหม่อีกครั้ง
                    </button>
                </div>

                <div class="relative w-full aspect-video">
                    <video 
                        id="main-player" 
                        class="video-js vjs-theme-city vjs-big-play-centered" 
                        controls 
                        preload="auto"
                        data-setup='{}'>
                    </video>
                </div>
            </div>

            <!-- Program Info Panel -->
            <div class="p-4 bg-gray-800 border-x border-b border-gray-700 rounded-b-xl shadow-md flex justify-between items-center">
                <div>
                    <h2 id="current-channel-title" class="text-lg font-bold text-white flex items-center gap-2">
                        <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        กำลังโหลดระบบ...
                    </h2>
                    <p id="current-channel-desc" class="text-gray-400 text-xs mt-1">กรุณารอสักครู่ ระบบกำลังดึงสัญญาณภาพ</p>
                </div>
                <div class="bg-gray-900/50 px-3 py-1.5 rounded-lg border border-gray-700 text-right">
                    <span class="text-[10px] uppercase tracking-wider text-gray-500 block font-semibold">ประเภทสัญญาณ</span>
                    <span class="text-xs font-bold text-red-400">HLS (.m3u8)</span>
                </div>
            </div>
        </div>

        <!-- Right Column: Channel Selection Playlist -->
        <div class="w-full lg:w-96 bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-xl flex flex-col h-[550px] lg:h-auto">
            <!-- Category Filter Buttons -->
            <div class="flex gap-1 mb-3 overflow-x-auto pb-1 custom-scroll">
                <button class="cat-btn active bg-red-600 text-white text-xs px-3 py-1.5 rounded-full font-medium shadow transition-all whitespace-nowrap" data-cat="all">ทั้งหมด</button>
                <button class="cat-btn bg-gray-700 text-gray-300 hover:bg-gray-600 text-xs px-3 py-1.5 rounded-full font-medium transition-all whitespace-nowrap" data-cat="general">วาไรตี้/ทั่วไป</button>
                <button class="cat-btn bg-gray-700 text-gray-300 hover:bg-gray-600 text-xs px-3 py-1.5 rounded-full font-medium transition-all whitespace-nowrap" data-cat="news">ข่าวสาร</button>
                <button class="cat-btn bg-gray-700 text-gray-300 hover:bg-gray-600 text-xs px-3 py-1.5 rounded-full font-medium transition-all whitespace-nowrap" data-cat="sports">กีฬา</button>
            </div>

            <div class="flex justify-between items-center mb-3 border-b border-gray-700 pb-2">
                <h3 class="text-sm font-bold tracking-wide text-gray-400 uppercase">ผังช่องรายการ (<span id="channel-count">0</span>)</h3>
            </div>

            <!-- Grid Container for Channel List -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-2 gap-3 overflow-y-auto flex-1 pr-1 custom-scroll" id="channel-list">
                <!-- Javascript will render channels here -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 text-center py-4 mt-6">
        <p class="text-xs text-gray-500">© 2026 TV Online Web App. พัฒนาสถาปัตยกรรมระบบโดย khamphong</p>
    </footer>

    <!-- Web App Logics -->
    <script>
        // ข้อมูลช่องแบ่งกลุ่มประเภท (Category) เพื่อความสะดวกในการกรองช่องข้อมูล
        const channels = [
            { id: 1, name: "MONO 29", cat: "general", desc: "รับชมภาพยนตร์และซีรีส์ชั้นนำระดับโลกแบบคมชัด", logo: "http://s.muanlai.com/images/180/static//live_tv_img/0/0/0/285_large.jpg?t=f15429a0ce", url: "https://live-us1.thaimomo.com/live-as/chmono29-2/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 2, name: "Workpoint TV", cat: "general", desc: "ความบันเทิง วาไรตี้ และเกมโชว์ยอดฮิตอันดับหนึ่ง", logo: "http://s.muanlai.com/images/180/static//live_tv_img/0/0/0/182_large.jpg?t=160d471e12", url: "https://live-us1.thaimomo.com/live-as/chworkpointt-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 3, name: "CH7-HD", cat: "general", desc: "สัญญาณถ่ายทอดสด ช่อง 7HD ถึงใจถึงอารมณ์", logo: "https://upload.wikimedia.org/wikipedia/commons/8/82/Ch-7-HD-Logo-crop.png", url: "https://live-us1.thaimomo.com/live-as/ch7hd-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 4, name: "CH3-HD", cat: "general", desc: "สัญญาณถ่ายทอดสด ช่อง 3HD คุ้มค่าทุกนาที ดูทีวีสีช่อง 3", logo: "https://i.imgur.com/YRiulCU.png", url: "https://live-us1.thaimomo.com/live-as/ch3hd-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 5, name: "Amarin TV", cat: "general", desc: "อมรินทร์ทีวี เอชดี ช่อง 34 เติมความคิด มิตรประจำบ้าน", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Amarin_TV_HD_34_Logo.svg/3840px-Amarin_TV_HD_34_Logo.svg.png", url: "https://live-us1.thaimomo.com/live-as/chamarin-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 6, name: "GMM25", cat: "general", desc: "ช่องจีเอ็มเอ็ม 25 ความบันเทิงสำหรับคนรุ่นใหม่", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/GMMTV_Logo.svg/1280px-GMMTV_Logo.svg.png", url: "https://live-us1.thaimomo.com/live-as/chgmmchannel-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 7, name: "MCOT HD", cat: "general", desc: "ช่อง 9 เอ็มคอตเอชดี เครือข่ายความคิด สร้างสรรค์สังคม", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/MCOT-Modernnine_TV_EN_2002.svg/1280px-MCOT-Modernnine_TV_EN_2002.svg.png", url: "https://live-us1.thaimomo.com/live-as/chmcothd-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 8, name: "Nation TV", cat: "news", desc: "เนชั่นทีวี ช่อง 22 สถานีข่าวอันดับหนึ่งของคนไทย", logo: "https://upload.wikimedia.org/wikipedia/commons/f/f9/Nation_TV_logo.png", url: "https://live-us1.thaimomo.com/live-as/chNation-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 9, name: "ONE 31", cat: "general", desc: "ช่องวัน 31 ข่าววันใหม่ ละครดี ซีรีส์เด่น วาไรตี้ปัง", logo: "https://upload.wikimedia.org/wikipedia/th/e/ef/Watermark-ONE.png", url: "https://live-us1.thaimomo.com/live-as/chone-3/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 10, name: "T Sport 7", cat: "sports", desc: "ทีสปอร์ต 7 ช่องกีฬาสร้างสรรค์เพื่อสังคมและเยาวชนไทย", logo: "https://cms.dmpcdn.com/livetv/2022/02/10/e00c0e00-8a3c-11ec-8f9e-831d2ccecc69_webp_original.png", url: "https://live-us1.thaimomo.com/live-as/chtsport-1/playlist.m3u8", type: "application/x-mpegURL" },
            { id: 11, name: "Thai PBS", cat: "news", desc: "ไทยพีบีเอส สื่อสาธารณะ พื้นที่การเรียนรู้และสร้างสรรค์", logo: "https://storage.googleapis.com/bucket-pdpa-static-prod/dev/upload/000/124/547/44f42066-08f6-4283-9e3b-75e396f976fd/original/LogoTpbs.png", url: "https://tv-live.tpchannel.org/live/tv.m3u8", type: "application/x-mpegURL" },
            { id: 12, name: "Top News", cat: "news", desc: "ท็อปนิวส์ สถานีข่าวความจริงรอบด้าน", logo: "https://images.topnews.co.th/2025/10/logo512_%E0%B8%82%E0%B8%B2%E0%B8%A7%E0%B8%94%E0%B8%B3.png?x-image-process=style/webp", url: "https://live.topnews.co.th/hls/topnews_a_720.m3u8", type: "application/x-mpegURL" },
            { id: 13, name: "True4U", cat: "general", desc: "ทรูโฟร์ยู ช่อง 24 กีฬาสด หนังดี วาไรตี้แน่น", logo: "https://contentthailand.com/wp-content/uploads/2021/08/true4u.png", url: "https://live-us1.thaimomo.com/live-as/chTrue4u-2/playlist.m3u8", type: "application/x-mpegURL" }
        ];

        let myPlayer;
        let currentSelectedChannel = null;
        let activeCategory = 'all';
        let searchQuery = '';

        // DOM Elements
        const channelListContainer = document.getElementById('channel-list');
        const currentTitle = document.getElementById('current-channel-title');
        const currentDesc = document.getElementById('current-channel-desc');
        const searchInput = document.getElementById('search-input');
        const channelCountEl = document.getElementById('channel-count');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const playerStatusOverlay = document.getElementById('player-status');
        const statusText = document.getElementById('status-text');
        const statusSpinner = document.getElementById('status-spinner');
        const retryBtn = document.getElementById('retry-btn');

        // ฟังก์ชันฟิลเตอร์ข้อมูลช่องและแสดงผล
        function renderChannels() {
            channelListContainer.innerHTML = '';
            
            // กรองตามหมวดหมู่และคำค้นหา
            const filtered = channels.filter(ch => {
                const matchCat = activeCategory === 'all' || ch.cat === activeCategory;
                const matchSearch = ch.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCat && matchSearch;
            });

            channelCountEl.textContent = filtered.length;

            if (filtered.length === 0) {
                channelListContainer.innerHTML = '<div class="col-span-2 text-center text-sm text-gray-500 py-8">ไม่พบช่องรายการที่ค้นหา</div>';
                return;
            }

            filtered.forEach((channel) => {
                const isSelected = currentSelectedChannel && currentSelectedChannel.id === channel.id;
                const button = document.createElement('button');
                
                button.className = `flex flex-col items-center justify-between p-2 rounded-xl transition-all border shadow-md select-none group text-center ${
                    isSelected 
                    ? 'bg-red-600 text-white font-bold border-red-500 scale-[0.97]' 
                    : 'bg-gray-700/60 hover:bg-gray-600 border-gray-700/50 text-gray-200 hover:scale-[1.02]'
                }`;

                button.innerHTML = `
                    <div class="w-full aspect-video bg-white rounded-lg p-1.5 flex items-center justify-center shadow-inner mb-2 overflow-hidden bg-gradient-to-b from-gray-50 to-gray-200">
                        <img src="${channel.logo}" alt="${channel.name}" class="max-w-full max-h-full object-contain transition-transform duration-300 group-hover:scale-110" onerror="this.src='https://placehold.co/150x100/1f2937/ffffff?text=TV+LIVE'">
                    </div>
                    <div class="w-full px-1">
                        <p class="font-bold text-xs line-clamp-1">${channel.name}</p>
                        <p class="text-[10px] ${isSelected ? 'text-red-200' : 'text-gray-400'} mt-0.5">CH ${channel.id.toString().padStart(2, '0')}</p>
                    </div>
                `;

                button.onclick = () => selectChannel(channel);
                channelListContainer.appendChild(button);
            });
        }

        // ฟังก์ชันสลับเปลี่ยนช่องและจัดการสถานะตัวเล่นวิดีโอ
        function selectChannel(channel) {
            currentSelectedChannel = channel;
            renderChannels(); // รีเรนเดอร์เพื่อเปลี่ยนสีปุ่มไฮไลท์

            currentTitle.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> ${channel.name}`;
            currentDesc.textContent = channel.desc;

            // แสดง Overlay กำลังโหลดสัญญาณ
            showPlayerStatus("กำลังโหลดสัญญาณช่อง " + channel.name + "...", true);

            if (myPlayer) {
                myPlayer.src({
                    src: channel.url,
                    type: channel.type
                });

                myPlayer.ready(() => {
                    myPlayer.play()
                        .then(() => hidePlayerStatus())
                        .catch(error => {
                            console.log("Auto-play blocked or error:", error);
                            // บางบราวเซอร์บล็อกเสียงตอนเริ่มเล่นอัตโนมัติ ให้ซ่อนสถานะเพื่อให้ผู้ใช้กดเล่นเองได้
                            hidePlayerStatus(); 
                        });
                });
            }
        }

        // ฟังก์ชันควบคุมหน้าต่างข้อความสถานะตัวเล่นวิดีโอ
        function showPlayerStatus(text, showSpinner = true, showRetry = false) {
            playerStatusOverlay.classList.remove('hidden');
            statusText.textContent = text;
            
            if (showSpinner) statusSpinner.classList.remove('hidden');
            else statusSpinner.classList.add('hidden');
            
            if (showRetry) retryBtn.classList.remove('hidden');
            else retryBtn.classList.add('hidden');
        }

        function hidePlayerStatus() {
            playerStatusOverlay.classList.add('hidden');
        }

        // การตั้งค่า Event Listeners และระบบเสริมความเป็น Web App
        function initWebAppEvents() {
            // ระบบค้นหาช่องรายการออนไลน์
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderChannels();
            });

            // หมวดหมู่ช่องรายการ
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.cat-btn').forEach(b => {
                        b.classList.remove('bg-red-600', 'text-white', 'active', 'shadow');
                        b.classList.add('bg-gray-700', 'text-gray-300');
                    });
                    btn.classList.add('bg-red-600', 'text-white', 'active', 'shadow');
                    btn.classList.remove('bg-gray-700', 'text-gray-300');
                    
                    activeCategory = btn.getAttribute('data-cat');
                    renderChannels();
                });
            });

            // ปุ่มโหลดสัญญาณใหม่อีกครั้งกรณีกระตุกหรือลิงก์ขาด
            retryBtn.onclick = () => {
                if(currentSelectedChannel) selectChannel(currentSelectedChannel);
            };

            // ระบบสลับโหมดสี (Dark / Light Mode)
            let isDark = true;
            themeToggleBtn.onclick = () => {
                const body = document.getElementById('app-body');
                isDark = !isDark;
                if (!isDark) {
                    body.classList.replace('bg-gray-900', 'bg-gray-100');
                    body.classList.replace('text-gray-100', 'text-gray-800');
                    themeToggleBtn.textContent = '☀️';
                } else {
                    body.classList.replace('bg-gray-100', 'bg-gray-900');
                    body.classList.replace('text-gray-800', 'text-gray-100');
                    themeToggleBtn.textContent = '🌙';
                }
            };
        }

        // เรียกใช้งานและโหลดตัวควบคุมหลักเมื่อเปิดหน้าเว็บ
        window.onload = () => {
            // ตั้งค่าเริ่มต้นตัวเล่น Video.js พร้อมดักจับ Error ลิงก์เสีย
            myPlayer = videojs('main-player', {
                fluid: true,
                autoplay: 'muted', 
                controls: true,
                controlBar: {
                    pictureInPictureToggle: true // เพิ่มฟีเจอร์ย่อหน้าจอไปเล่นแอปอื่นได้ (PIP)
                }
            });

            // ดักจับ Error กรณีสตรีมดับหรือลิงก์ .m3u8 มีปัญหา
            myPlayer.on('error', function() {
                const err = myPlayer.error();
                console.error("Video.js Error Code:", err.code, err.message);
                showPlayerStatus("ไม่สามารถเชื่อมต่อสัญญาณช่องนี้ได้ชั่วคราว (สัญญาณขาดหาย)", false, true);
            });

            initWebAppEvents();

            if (channels.length > 0) {
                // เลือกช่องแรกเป็นช่อง Default ตอนเปิดแอป
                currentSelectedChannel = channels[0];
                renderChannels();
                
                myPlayer.ready(() => {
                    myPlayer.src({
                        src: channels[0].url,
                        type: channels[0].type
                    });
                    currentTitle.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> ${channels[0].name}`;
                    currentDesc.textContent = channels[0].desc;
                });
            }
        };
    </script>
</body>
</html>
