<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy TV Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <style>
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        /* แต่ง Scrollbar ของรายชื่อช่อง */
        #channel-list::-webkit-scrollbar {
            width: 6px;
        }
        #channel-list::-webkit-scrollbar-thumb {
            background-color: #000000;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

    <header class="bg-gray-800 p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-500 flex items-center gap-2">
                 <span class="text-white">TV Online</span>
            </h1>
            <span class="text-sm text-gray-400">ระบบทีวีออนไลน์</span>
        </div>
    </header>

    <main class="container mx-auto flex-1 p-4 flex flex-col lg:flex-row gap-6">

        <div class="flex-1 bg-black rounded-lg overflow-hidden shadow-lg flex flex-col justify-center">
            <div class="relative w-full aspect-video">
                <video 
                    id="main-player" 
                    class="video-js vjs-default-skin vjs-big-play-centered" 
                    controls 
                    preload="auto"
                    data-setup='{}'>
                </video>
            </div>
            <div class="p-4 bg-gray-800">
                <h2 id="current-channel-title" class="text-xl font-semibold">ดาวน์โหลดระบบ...</h2>
                <p id="current-channel-desc" class="text-gray-400 text-sm mt-1">กำลังเริ่มระบบการฉาย</p>
            </div>
        </div>

        <div class="w-full lg:w-96 bg-gray-800 rounded-lg p-4 shadow-lg flex flex-col">
            <h3 class="text-lg font-bold mb-4 border-b border-gray-700 pb-2 text-red-400">ผังช่องรายการ</h3>

            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-2 gap-3 overflow-y-auto max-h-[400px] lg:max-h-[500px] pr-1" id="channel-list">
                </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-center py-4 border-t border-gray-700 mt-6">
        <p class="text-sm text-gray-500">© 2026 by khamphong. พัฒนาขึ้นเพื่อเป็นโครงสร้างต้นแบบ</p>
    </footer>

    <script>
        // ข้อมูลช่องทีวีพร้อมลิงก์โลโก้ (Logo) แบบรูปภาพจริง
        const channels = [
            {
                id: 1,
                name: "MONO 29",

                url: "https://live-us1.thaimomo.com/live-as/chmono29-2/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 2,
                name: "Workpoint TV",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่องเวิร์คพอยท์ทีวี",
                logo: "http://s.muanlai.com/images/180/static//live_tv_img/0/0/0/182_large.jpg?t=160d471e12", 
                url: "https://live-us1.thaimomo.com/live-as/chworkpointt-3/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 3,
                name: "CH7-HD",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง 7HD",
                logo: "https://upload.wikimedia.org/wikipedia/commons/8/82/Ch-7-HD-Logo-crop.png", 
                url: "https://live-us1.thaimomo.com/live-as/ch7hd-3/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 4,
                name: "CH3-HD",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง 3HD",
                logo: "https://i.imgur.com/YRiulCU.png", 
                url: "https://live-us1.thaimomo.com/live-as/ch3hd-3/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 5,
                name: "Amarin TV",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง Amarin TV",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Amarin_TV_HD_34_Logo.svg/3840px-Amarin_TV_HD_34_Logo.svg.png", 
                url: "https://live-us1.thaimomo.com/live-as/chamarin-3/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 6,
                name: "Amarin TV",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง GMM",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/GMMTV_Logo.svg/1280px-GMMTV_Logo.svg.png", 
                url: "https://live-us1.thaimomo.com/live-as/chgmmchannel-3/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 7,
                name: "MCOT HD",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง MCOT HD",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/MCOT-Modernnine_TV_EN_2002.svg/1280px-MCOT-Modernnine_TV_EN_2002.svg.png", 
                url: "https://live-us1.thaimomo.com/live-as/chmcothd-3/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 8,
                name: "Nation",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง Nation",
                logo: "https://upload.wikimedia.org/wikipedia/commons/f/f9/Nation_TV_logo.png", 
                url: "https://live-us1.thaimomo.com/live-as/chNation-3/playlist.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 9,
                name: "ONE",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง ONE",
                logo: "https://upload.wikimedia.org/wikipedia/th/e/ef/Watermark-ONE.png", 
                url: "https://live-us1.thaimomo.com/live-as/chone-3/playlist.m3u8",

            },
            {
                id: 10,
                name: "T Sport",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง T Sport",
                logo: "https://cms.dmpcdn.com/livetv/2022/02/10/e00c0e00-8a3c-11ec-8f9e-831d2ccecc69_webp_original.png",

            },
            {
                id: 11,
                name: "Thai PBS",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง Thai PBS",
                logo: "https://storage.googleapis.com/bucket-pdpa-static-prod/dev/upload/000/124/547/44f42066-08f6-4283-9e3b-75e396f976fd/original/LogoTpbs.png", 
                url: "https://tv-live.tpchannel.org/live/tv.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 12,
                name: "Top new",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง Top new",
                logo: "https://images.topnews.co.th/2025/10/logo512_%E0%B8%82%E0%B8%B2%E0%B8%A7%E0%B8%94%E0%B8%B3.png?x-image-process=style/webp", 
                url: "https://live.topnews.co.th/hls/topnews_a_720.m3u8",
                type: "application/x-mpegURL"
            },
            {
                id: 13,
                name: "True 4U",
                desc: "กำลังรับชมสัญญาณถ่ายทอดสดช่อง True 4U",
                logo: "https://contentthailand.com/wp-content/uploads/2021/08/true4u.png", 
                url: "https://live-us1.thaimomo.com/live-as/chTrue4u-2/playlist.m3u8",
                type: "application/x-mpegURL"
            }
        ];

        let myPlayer;
        const channelListContainer = document.getElementById('channel-list');
        const currentTitle = document.getElementById('current-channel-title');
        const currentDesc = document.getElementById('current-channel-desc');

        // ฟังก์ชันแสดงรายชื่อช่องบนหน้าเว็บในรูปแบบ การจัดวางการ์ด Grid
        function renderChannels() {
            channelListContainer.innerHTML = '';
            channels.forEach((channel, index) => {
                const button = document.createElement('button');
                // ดีไซน์ใหม่: จัดวางองค์ประกอบในแนวตั้ง (flex-col) และจัดตำแหน่งกึ่งกลาง (items-center text-center)
                button.className = `flex flex-col items-center justify-between p-3 rounded-lg transition-all border border-transparent shadow-md select-none group ${
                    index === 0 
                    ? 'bg-red-600 text-white font-bold border-red-500 scale-[0.98]' 
                    : 'bg-gray-700 hover:bg-gray-600 text-gray-200 hover:scale-[1.02]'
                }`;

                // โครงสร้างปุ่มใน Grid: โลโก้อยู่บน ชื่อช่องและหมายเลข CH อยู่ล่าง
                button.innerHTML = `
                    <div class="w-full aspect-video bg-white rounded-md p-1 flex items-center justify-center shadow-inner mb-2 overflow-hidden">
                        <img src="${channel.logo}" alt="${channel.name}" class="max-w-full max-h-full object-contain transition-transform group-hover:scale-105">
                    </div>
                    <div class="w-full text-center">
                        <p class="font-medium text-xs sm:text-sm line-clamp-1 w-full">${channel.name}</p>
                        <p class="text-[10px] ${index === 0 ? 'text-red-200' : 'text-gray-400'} mt-0.5">CH ${channel.id}</p>
                    </div>
                `;

                button.onclick = () => selectChannel(channel, button);
                channelListContainer.appendChild(button);
            });
        }

        // ฟังก์ชันสำหรับเปลี่ยนช่องทีวีผ่าน Video.js
        function selectChannel(channel, activeBtn) {
            if (myPlayer) {
                myPlayer.src({
                    src: channel.url,
                    type: channel.type
                });

                myPlayer.play().catch(error => {
                    console.log("Browser block auto-play with audio:", error);
                });

                currentTitle.textContent = channel.name;
                currentDesc.textContent = channel.desc;

                // รีเซ็ตการตั้งค่าคลาสและสไตล์ของปุ่มทั้งหมดใน Grid กลับไปเป็นแบบปกติ
                const buttons = channelListContainer.querySelectorAll('button');
                buttons.forEach((btn) => {
                    btn.className = "flex flex-col items-center justify-between p-3 rounded-lg transition-all border border-transparent shadow-md select-none group bg-gray-700 hover:bg-gray-600 text-gray-200 hover:scale-[1.02]";
                    const subText = btn.querySelector('div > p:nth-child(2)');
                    if (subText) subText.className = "text-[10px] text-gray-400 mt-0.5";
                });

                // ไฮไลท์ปุ่มใน Grid ที่กำลังถูกเลือกเล่น
                activeBtn.className = "flex flex-col items-center justify-between p-3 rounded-lg transition-all border border-transparent shadow-md select-none group bg-red-600 text-white font-bold border-red-500 scale-[0.98]";
                const activeSubText = activeBtn.querySelector('div > p:nth-child(2)');
                if (activeSubText) activeSubText.className = "text-[10px] text-red-200 mt-0.5";
            }
        }

        // เริ่มทำงานเมื่อเปิดหน้าเว็บ
        window.onload = () => {
            myPlayer = videojs('main-player', {
                fluid: true,
                autoplay: 'muted', 
                controls: true
            });

            renderChannels();

            if (channels.length > 0) {
                myPlayer.ready(() => {
                    myPlayer.src({
                        src: channels[0].url,
                        type: channels[0].type
                    });
                    currentTitle.textContent = channels[0].name;
                    currentDesc.textContent = channels[0].desc;
                });
            }
        };
    </script>
</body>
</html>
